<div class="flex min-h-screen flex-col">
  <header class="bg-primary text-primary-foreground flex items-center justify-center gap-4 p-4">
    <!-- TODO: left logo -->
    <h1 class="text-2xl font-bold">LPU-L Attendance Management System</h1>
    <!-- TODO: right logo -->
  </header>

  <main class="bg-muted flex flex-1 items-center justify-center p-4">
    <section hlmCard class="w-full max-w-md">
      <div hlmCardHeader>
        <h2 hlmCardTitle>Sign in</h2>
        <p hlmCardDescription>Enter your username and password to access your account.</p>
      </div>
      <div hlmCardContent>
        <form hlmFieldGroup (ngSubmit)="onSubmit()">
          <div hlmField>
            <label hlmFieldLabel for="username">Username</label>
            <input
              hlmInput
              id="username"
              name="username"
              [ngModel]="username()"
              (ngModelChange)="username.set($event)"
              [ngModelOptions]="{ standalone: true }"
            />
          </div>

          <div hlmField>
            <label hlmFieldLabel for="password">Password</label>
            <div class="relative">
              <input
                hlmInput
                id="password"
                name="password"
                [type]="showPassword() ? 'text' : 'password'"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                [ngModelOptions]="{ standalone: true }"
              />
              <button
                hlmBtn
                type="button"
                variant="ghost"
                size="icon"
                class="text-muted-foreground absolute inset-y-0 right-1 my-auto"
                [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
                (click)="showPassword.set(!showPassword())"
              >
                <ng-icon [name]="showPassword() ? 'lucideEyeOff' : 'lucideEye'" />
              </button>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <hlm-checkbox
              id="remember"
              [checked]="rememberMe()"
              (checkedChange)="rememberMe.set($event)"
            />
            <label hlmLabel for="remember">Remember me</label>
          </div>

          <button hlmBtn type="submit">Login</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="bg-primary text-primary-foreground flex items-center justify-center p-4">
    <p class="text-sm">© 2026 Lyceum of the Philippines University - Laguna</p>
  </footer>
</div>
